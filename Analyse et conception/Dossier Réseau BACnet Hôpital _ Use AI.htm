ons complexes et difficiles nécessitant un raisonnement profond et une analyse complète.\",\"model_card_description_gpt_4o_mini\":\"GPT-4o Mini est une version allégée de GPT-4o qui fournit des réponses rapides et efficaces tout en maintenant une haute qualité pour les tâches et conversations quotidiennes.\",\"model_card_description_gpt_5\":\"GPT-5 est le modèle linguistique phare d'OpenAI qui excelle dans le raisonnement complexe, les vastes connaissances du monde réel, le code intensif et les tâches agentiques multi-étapes.\",\"model_card_description_grok_4\":\"Le dernier et meilleur modèle phare de xAI, offrant des performances inégalées en langage naturel, en mathématiques et en raisonnement – le parfait touche-à-tout.\",\"model_card_description_gpt_4o\":\"GPT-4o combine fiabilité et fortes capacités de raisonnement, offrant des performances constantes sur un large éventail de tâches avec un traitement efficace.\",\"model_card_selected\":\"Sélectionné\",\"model_claude_opus_4_1_subtitle\":\"Réponses réfléchies et soignées\",\"model_claude_opus_4_5_subtitle\":\"Opus solide et équilibré\",\"model_deepseek_r1_subtitle\":\"Explique clairement ses étapes\",\"model_gemini_2_5_flash_subtitle\":\"Excellent polyvalent\",\"model_card_description_gemini_3_pro\":\"Gemini 3 Pro est la dernière génération de modèles, offrant des performances inégalées en langage naturel, mathématiques et raisonnement.\",\"model_gemini_3_pro_subtitle\":\"Raisonnement, grand contexte\",\"model_qwen_3_max_subtitle\":\"Gère les travaux longs et détaillés\",\"model_llama_3_3_70b_versatile_subtitle\":\"Polyvalent pour les tâches quotidiennes\",\"model_deepinfra_kimi_k2_subtitle\":\"Excellent pour les questions difficiles\",\"model_gpt_4o_mini_subtitle\":\"Rapide et réactif\",\"model_gpt_5_subtitle\":\"Modèle de chat intelligent\",\"model_gpt_4o_subtitle\":\"Fiable, raisonnement solide\",\"model_grok_4_subtitle\":\"Rapide, précis et utile\",\"model_gpt_5_4_subtitle\":\"Modèle phare\",\"model_card_des ute $10k/mois pour la croissance\u003c/highlight\u003e n'est qu'à \\n un prompt IA de distance.\",\"authority_line\":\"Essayez ce prompt pour débloquer 4 autres prompts méga puissants\",\"prompt\":\"$24\",\"expert_prompt\":\"$25\",\"try_this_prompt_now\":\"Essayez ce prompt maintenant\",\"prompt_info_label\":\"Ce prompt produit des résultats magiques lorsqu'il est utilisé sans modification\"},\"ImageLanding\":{\"hero_v2_line_1\":\"Commencez à créer avec\",\"hero_v2_sub\":\"Décrivez une scène, un personnage, une ambiance ou un style — et regardez-le prendre vie.\",\"prompt_what_to_generate\":\"Décrivez n'importe quelle image que vous souhaitez créer\",\"prompt_what_to_generate_v2\":\"Décrivez l'image que vous souhaitez générer ou téléchargez une photo et modifiez-la avec l'IA\",\"prompt_edit_image_title\":\"Téléchargez votre image pour commencer à la modifier avec l'IA. Tapez ensuite ce que vous souhaitez changer.\",\"outcome_focused_headline\":\"Créez des images IA époustouflantes en quelques secondes\",\"outcome_focused_subtext\":\"Approuvé par plus de 700 000 personnes · Aucune carte bancaire requise\",\"generate_image_from_reference\":\"inspirée de la photo de référence téléchargée\",\"generate_image_from_pasted_content\":\"Générez une image à partir du contenu collé :\",\"generate_image_prompt_prefix\":\"Générez une image avec cette description : {description}\",\"generate_images_prompt_prefix\":\"Génère {count} variations avec cette description : {description}\",\"prompt_style_suffix\":\"Style : {label}\",\"prompt_aspect_ratio\":\"Format : {label}\",\"prompt_model\":\"Modèle : {label}\",\"aspect_ratio_label\":\"Format\",\"style_label\":\"Style\",\"style_none\":\"Aucun\",\"style_realistic\":\"Réaliste\",\"style_cartoon\":\"Dessin animé\",\"style_3d\":\"Rendu 3D\",\"style_anime\":\"Anime\",\"style_digital_art\":\"Numérique\",\"style_abstract\":\"Abstrait\",\"ratio_1_1\":\"1:1 (Carré)\",\"ratio_4_3\":\"4:3 (Standard)\",\"ratio_3_4\":\"3:4 (Portrait)\",\"ratio_16_9\":\"16:9 (Large écran)\",\"ratio_9_16\":\"9:16 (Mobile)\",\"ratio_21_9\":\"21:9 (Ultra large)\",\"variations_1\":\"1 image\",\"variations_2\":\"2 images\",\"variations_4\":\"4 images\",\"gallery_title\":\"Mes images\",\"gallery_loading\":\"Chargement des images...\",\"gallery_empty\":\"Vous n'avez pas encore généré d'images\",\"image_unavailable\":\"Image indisponible\",\"try_style_title\":\"Essayez un style sur une image\",\"discover_title\":\"Découvrez quelque chose de nouveau\",\"modal_subtitle\":\"Découvrez quelque chose de nouveau\",\"modal_recents\":\"Récents\",\"modal_choose_photo\":\"Choisir une nouvelle photo\",\"modal_cancel\":\"Annuler\",\"discover_prompt_cartoon\":\"Transforme-moi en personnage de dessin animé\",\"discover_prompt_headshot\":\"Crée un portrait professionnel\",\"discover_prompt_pet_royalty\":\"Fais ressembler mon animal à la royauté\",\"discover_prompt_superhero\":\"À quoi ressemblerais-je en super-héros ?\",\"discover_prompt_watercolor\":\"Transforme ma photo en aquarelle\",\"discover_prompt_action_figure\":\"Transforme-moi en figurine d'action\",\"style_prompt_realistic\":\"Transforme ma photo téléchargée en une image hyper-réaliste et haute définition. Améliore l'éclairage, les textures et les détails pour qu'elle ressemble à une photo prise par un professionnel avec une clarté parfaite, des couleurs naturelles et une profondeur de champ cinématographique.\",\"style_prompt_cartoon\":\"Transforme ma photo téléchargée en une illustration cartoon vibrante. Réinterprète le sujet avec des contours marqués, des traits exagérés, des couleurs vives et saturées, et un style animé amusant similaire aux films d'animation modernes.\",\"style_prompt_3d\":\"Transforme ma photo téléchargée en un rendu 3D de haute qualité. Réinterprète le sujet comme un modèle 3D détaillé avec des surfaces lisses, un éclairage de studio, des ombres subtiles et une apparence tridimensionnelle soignée comme un personnage Pixar ou CGI.\",\"style_prompt_anime\":\"Transforme ma photo téléchargée en style anime. Réinterprète le sujet avec de grands yeux expressifs, des cheveux stylisés, des lignes nettes et l'esthétique distinctive de l'anime japonais avec un éclairage dramatique et des couleurs vives.\",\"style_prompt_digital_art\":\"Transforme ma photo téléchargée en une superbe œuvre d'art numérique. Réinterprète le sujet avec des techniques de peinture numérique créatives, des palettes de couleurs riches, des coups de pinceau artistiques et une esthétique d'illustration numérique moderne.\",\"style_prompt_abstract\":\"Transforme ma photo téléchargée en une œuvre d'art abstraite. Réinterprète le sujet avec des formes géométriques, des blocs de couleurs audacieux, des compositions surréalistes et une abstraction artistique tout en gardant l'essence de l'original reconnaissable.\",\"discover_prompt_text_cartoon\":\"Prends ma photo téléchargée et transforme-moi en un personnage de dessin animé amusant. Réinterprète mon apparence comme si j'étais un personnage dans un film d'animation Pixar ou Disney — utilise des contours marqués, des traits exagérés mais flatteurs, des couleurs vibrantes et un style animé expressif. Garde ma ressemblance reconnaissable.\",\"discover_prompt_text_headshot\":\"Prends ma photo téléchargée et crée un portrait professionnel d'entreprise. Améliore l'éclairage, affine les détails, utilise un arrière-plan neutre ou dégradé, assure une tenue et une posture professionnelles, et fais-moi paraître soigné et confiant — comme si c'était pris par un photographe portraitiste professionnel.\",\"discover_prompt_text_pet_royalty\":\"Prends ma photo téléchargée et réimagine mon animal de compagnie en royauté. Habille-le de vêtements royaux comme une couronne, une cape royale et des bijoux. Place-le sur un trône orné ou dans un décor de grand palais. Fais-le ressembler à un portrait royal officiel avec un éclairage dramatique et des détails riches et opulents.\",\"discover_prompt_text_superhero\":\"Prends ma photo téléchargée et transforme-moi en super-héros. Donne-moi un costume de super-héros unique et original avec une cape, un masque ou un emblème, et un physique de super-héros. Place-moi dans une pose d'action dramatique avec un paysage urbain ou un arrière-plan épique. Ajoute des effets visuels comme des auras d'énergie, du vent ou un éclairage dramatique.\",\"discover_prompt_text_watercolor\":\"Prends ma photo téléchargée et transforme-la en une belle peinture aquarelle. Utilise des coups de pinceau aquarelle doux et fluides, des fondus de couleurs délicats, des lavis translucides et la texture de papier caractéristique de l'aquarelle traditionnelle. Garde la composition reconnaissable mais avec une qualité artistique peinte à la main.\",\"discover_prompt_text_action_figure\":\"Prends ma photo téléchargée et réimagine-moi en figurine d'action de collection dans son emballage. Montre-moi comme une figurine d'action détaillée avec une texture plastique, des articulations mobiles et des accessoires. Inclus un emballage de jouet réaliste avec une fenêtre transparente, une carte de fond colorée et un branding de produit.\",\"ideas_chip_enhance\":\"Améliorer\",\"ideas_chip_create_art\":\"Créer\",\"ideas_chip_design\":\"Conception\",\"ideas_chip_swap_outfit\":\"Échanger\",\"ideas_chip_visualize\":\"Visualiser\",\"ideas_prompt_restore_photo\":\"une vieille photo\",\"ideas_prompt_professional_headshot\":\"un portrait en portrait\",\"ideas_prompt_oil_painting\":\"une photo en peinture\",\"ideas_prompt_colorize_photo\":\"une photo en noir et blanc avec de la couleur\",\"ideas_prompt_cartoonize\":\"une version dessin animé d'une photo\",\"ideas_prompt_watercolor_painting\":\"une peinture\",\"ideas_prompt_tshirt_design\":\"un graphique de t-shirt\",\"ideas_prompt_cute_character\":\"une illustration de personnage mignon\",\"ideas_prompt_business_logo\":\"un logo d'entreprise\",\"ideas_prompt_event_flyer\":\"un dépliant d'événement\",\"ideas_prompt_sports_schedule\":\"un graphique de calendrier sportif\",\"ideas_prompt_social_media_ad\":\"une publicité sur les réseaux sociaux\",\"ideas_prompt_new_outfit\":\"une tenue sur une photo\",\"ideas_prompt_swap_clothing\":\"vêtements entre deux photos\",\"ideas_prompt_change_hairstyle\":\"une coiffure\",\"ideas_prompt_outfit_color\":\"couleurs de tenue\",\"ideas_prompt_restyle_room\":\"une refonte de la pièce\",\"ideas_prompt_stage_room\":\"une pièce vide avec des meubles\",\"ideas_prompt_house_extension\":\"une extension de maison\",\"ideas_prompt_new_build\":\"un nouvel extérieur de bâtiment\",\"enhancer_headline\":\"Téléchargez une photo pour l'améliorer et l'agrandir avec l'IA\",\"enhancer_prompt_prefix\":\"Améliorer et agrandir mon image.\",\"send_button_generate\":\"Générer\"},\"BackgroundLanding\":{\"hero_title\":\"Suppression d'arrière-plan avec \u003caccent\u003eIA\u003c/accent\u003e\",\"hero_title_variant_b\":\"\u003caccent\u003eSupprimez\u003c/accent\u003e n'importe quel arrière-plan en quelques secondes\",\"hero_subtitle\":\"Importez une photo et obtenez un détourage net et précis en quelques secondes.\",\"social_proof_hd_download\":\"Téléchargement HD\",\"social_proof_image_enhancer\":\"Améliorateur d'images\",\"social_proof_formats\":\"JPG, PNG, WEBP, HEIC\",\"social_proof_daily\":\"Plus de 5M d'images générées par jour\",\"showcase_title\":\"Arrière-plan supprimé, et maintenant ?\",\"showcase_swap\":\"Changer la couleur\",\"showcase_transparent\":\"Arrière-plan transparent\",\"showcase_new_bg\":\"Nouvel arrière-plan\",\"showcase_possibilities\":\"Des possibilités infinies\",\"features_heading\":\"Conçu pour chaque type de workflow\",\"features_subtitle\":\"Des retouches personnelles rapides aux traitements professionnels à grande échelle.\",\"feature_for_individuals_title\":\"Pour les particuliers\",\"feature_for_individuals_description\":\"Photos de profil, publications sur les réseaux sociaux et projets personnels.\",\"feature_for_freelancers_title\":\"Pour les freelances\",\"feature_for_freelancers_description\":\"Livrables clients, maquettes et pièces de portfolio.\",\"feature_for_marketing_title\":\"Pour le marketing\",\"feature_for_marketing_description\":\"Assets de campagnes, bannières et créations publicitaires à grande échelle.\",\"feature_for_developers_title\":\"Pour les développeurs\",\"feature_for_developers_description\":\"Intégration API pour des pipelines d'images automatisés.\",\"feature_for_ecommerce_title\":\"Pour l'e-commerce\",\"feature_for_ecommerce_description\":\"Photos de produits nettes sur fond blanc ou transparent.\",\"feature_for_enterprise_title\":\"Pour les entreprises\",\"feature_for_enterprise_description\":\"Traitement en masse avec une sortie cohérente et prête pour la marque.\",\"before_after_heading\":\"Voyez la différence\",\"before_after_subtitle\":\"Des détourages nets et précis pour les personnes, produits, animaux et bien plus.\",\"before_after_tab_people\":\"Personnes\",\"before_after_tab_products\":\"Produits\",\"before_after_tab_animals\":\"Animaux\",\"before_after_tab_cars\":\"Voitures\",\"upload_click_or_drag\":\"Cliquez ou déposez une image ici\",\"upload_unsupported_file_alert\":\"Seules les images JPG, PNG, WebP et HEIC sont prises en charge.\",\"upload_formats\":\"JPG, JPEG, PNG, WEBP, HEIC\",\"upload_uploading\":\"Téléchargement...\",\"upload_starting\":\"Démarrage...\",\"upload_remove_background\":\"Supprimer l'arrière-plan\",\"upload_button\":\"Télécharger une image\",\"drop_image_anywhere\":\"Déposez l'image n'importe où\",\"background_removal_prompt\":\"Supprimez l'arrière-plan de cette image et rendez-le entièrement transparent.\",\"toast_no_image_title\":\"Aucune image ajoutée\",\"toast_no_image_description\":\"Veuillez télécharger une image pour supprimer son arrière-plan.\",\"bg_removal_creation_hero_headline\":\"Téléchargez ou glissez-déposez votre image pour supprimer l'arrière-plan sur des portraits, des produits, des logos ou autre chose.\",\"bg_removal_creation_hero_headline_mobile\":\"Téléchargez votre image pour supprimer l'arrière-plan sur des portraits, des produits, des logos ou autre chose.\",\"bg_removal_input_placeholder\":\"Supprimer l'arrière-plan de cette image...\"},\"MessagePastedText\":{\"label_pasted\":\"Collé\",\"label_characters\":\"caractères\",\"pasted_content_title\":\"Contenu collé\",\"label_text\":\"Texte\",\"label_click_to_edit\":\"Cliquez pour modifier\",\"label_click_to_view\":\"Cliquez pour voir\",\"label_changes_save_automatically\":\"Les modifications sont enregistrées automatiquement pendant l'édition\"},\"AppsLanding\":{\"page_title\":\"Applications\",\"page_subtitle\":\"Découvrez nos outils alimentés par l'IA\",\"image_generation_title\":\"Génération d'images\",\"image_generation_description\":\"Créez des images époustouflantes à partir de descriptions textuelles avec l'IA\",\"background_removal_title\":\"Suppression d'arrière-plan\",\"background_removal_description\":\"Supprimez les arrière-plans d'images en quelques secondes avec l'IA\",\"image_enhancer_title\":\"Améliorateur d'images\",\"image_enhancer_description\":\"Améliorez et agrandissez vos photos en haute résolution avec l'IA\"},\"ChatExamples\":{\"email\":{\"title\":\"Aidez-moi à écrire (exemple)\",\"user_1\":\"Je dois écrire un e-mail à mon responsable pour demander un congé le mois prochain. Je veux que cela paraisse professionnel mais pas trop formel. Voici ce que je veux dire : j'ai besoin de 5 jours de congé du 10 au 14 mars pour un événement familial.\",\"assistant_1\":\"Voici une version raffinée de votre demande de congé :\\n\\nObjet : Demande de congés – 10-14 mars\\n\\nBonjour [nom du manager],\\n\\nJ'espère que tu vas bien. J'aimerais demander un congé du lundi 10 mars au vendredi 14 mars pour un événement familial.\\n\\nJe m'assurerai que toutes les tâches et délais en cours sont respectés avant mon départ, et je serai heureux de coordonner le transfert avec l'équipe.\\n\\nS'il vous plaît laissez-moi savoir si vous avez besoin de détails supplémentaires.\\n\\nCordialement,\\n[Votre nom]\\n\\n---\\n\\nVoulez-vous que j'ajuste le ton, que j'ajoute plus de contexte ou que je le raccourcisse ?\",\"user_2\":\"Pouvez-vous le raccourcir ? Juste 2-3 phrases.\",\"assistant_2\":\"Objet : Demande de congés – 10-14 mars\\n\\nBonjour [nom du manager],\\n\\nJ'aimerais demander un congé du 10 au 14 mars pour un événement familial. Tous les travaux en cours seront couverts avant mon départ. Faites-moi savoir si vous avez besoin d'autre chose.\\n\\nMeilleur,\\n[Votre nom]\\n\\n---\\n\\nFait. Voulez-vous que j'ajuste autre chose ?\"},\"logo\":{\"title\":\"Créer un logo (exemple)\",\"user_1\":\"Je démarre un petit café appelé \\\"Morning Ritual\\\" et j'ai besoin d'un logo. Je veux quelque chose de propre et de moderne, peut-être avec une icône de tasse à café.\",\"prompt_1\":\"Logo moderne et épuré pour un café appelé Morning Ritual, silhouette minimale de tasse à café avec de la vapeur formant un subtil motif de lever de soleil, typographie contemporaine sans empattement, noir et blanc\",\"assistant_1\":\"Voici un concept de logo épuré et moderne pour Morning Ritual. Il présente une silhouette minimale de tasse à café avec de la vapeur formant un subtil motif de lever de soleil. La typographie utilise une police sans empattement contemporaine.\\n\\nVoulez-vous que j’essaie un style différent, que je change les couleurs ou que j’ajuste l’icône ?\",\"user_2\":\"J'aime bien mais pouvez-vous l'essayer avec des tons terre ? Marron et crème au lieu de noir.\",\"prompt_2\":\"Logo moderne et épuré pour un café appelé Morning Ritual, silhouette minimale de tasse à café avec de la vapeur formant un subtil motif de lever de soleil, typographie contemporaine sans empattement, tons terre, icône marron foncé, fond crème riche\",\"assistant_2\":\"Voici la version mise à jour avec des tons chauds de terre – marron foncé pour l'icône et crème riche pour l'arrière-plan. La palette chaleureuse lui donne une sensation artisanale plus invitante.\\ re-normatif-et-réglementaire)\n4. [Architecture du système BACnet](#4-architecture-du-système-bacnet)\n5. [Composants et équipements](#5-composants-et-équipements)\n6. [Topologie réseau recommandée](#6-topologie-réseau-recommandée)\n7. [Objets BACnet et intégration des systèmes](#7-objets-bacnet-et-intégration-des-systèmes)\n8. [Sécurité et cybersécurité](#8-sécurité-et-cybersécurité)\n9. [Mise en service et tests](#9-mise-en-service-et-tests)\n10. [Exploitation et maintenance](#10-exploitation-et-maintenance)\n11. [Annexes](#11-annexes)\n\n---\n\n## 1. Introduction et contexte\n\n### 1.1 Qu'est-ce que BACnet?\n\n**BACnet** (Building Automation and Control Networks) est un protocole de communication ouvert, normalisé par l'ASHRAE (norme ANSI/ASHRAE 135) et adopté internationalement (ISO 16484-5). Il permet l'interopérabilité entre équipements de différents fabricants pour la gestion technique des bâtiments (GTB) : CVC, éclairage, contrôle d'accès, comptage énergétique, etc.\n\n### 1.2 Pourquoi BACnet dans un hôpital?\n\nUn centre hospitalier québécois présente des exigences critiques :\n\n- **Continuité des services** : salles d'opération, soins intensifs, urgences\n- **Qualité de l'air et pression différentielle** : salles blanches, isolement\n- **Efficacité énergétique** : conformité aux objectifs gouvernementaux\n- **Traçabilité et conformité** : audits, rapports réglementaires\n- **Flexibilité** : ajout de nouveaux équipements sans remplacement complet\n\nBACnet répond à ces besoins grâce à son caractère ouvert, sa capacité d'intégration et sa robustesse éprouvée en milieu hospitalier.\n\n---\n\n## 2. Objectifs du projet\n\n| Objectif | Description |\n|----------|-------------|\n| **Interopérabilité** | Intégrer des équipements de fabricants variés (Siemens, Honeywell, Johnson Controls, Schneider, Priva, etc.) |\n| **Supervision centralisée** | Interface unique pour surveiller et piloter l'ensemble des systèmes techniques |\n| **Efficacité énergétique** | Optimiser la consommation via des stratégies de régulation avancées |\n| **Conformité réglementaire** | Respecter les codes du bâtiment du Québec et les normes CSA |\n| **Sécurité des patients** | Assurer la qualité de l'air, les pressions différentielles et la redondance des systèmes critiques |\n| **Évolutivité** | Permettre des extensions futures sans refonte majeure |\n\n---\n\n## 3. Cadre normatif et réglementaire\n\n### 3.1 Normes techniques\n\n| Norme | Description |\n|-------|-------------|\n| **ANSI/ASHRAE 135** | Standard BACnet – définit les objets, services et couches réseau |\n| **ISO 16484-5** | Adoption internationale de BACnet |\n| **ASHRAE 170** | Ventilation des établissements de soins de santé |\n| **CSA Z317.2** | Systèmes de chauffage, ventilation et conditionnement d'air dans les établissements de santé (Canada) |\n\n### 3.2 Réglementation québécoise\n\n- **Code de construction du Québec** (chapitre Bâtiment)\n- **Loi sur l'efficacité énergétique** et règlements associés\n- **Directives du MSSS** (Ministère de la Santé et des Services sociaux) concernant les établissements de santé\n- **Exigences de Transition énergétique Québec** pour les bâtiments publics\n\n### 3.3 Certifications et profils BACnet\n\nLors de la sélection des équipements, exiger des **PICS** (Protocol Implementation Conformance Statement) attestant la conformité aux profils suivants :\n\n| Profil | Rôle |\n|--------|------|\n| **B-AWS** | Advanced Workstation – poste de supervision avancé |\n| **B-BC** | Building Controller – contrôleur principal |\n| **B-AAC** | Advanced Application Controller – contrôleur d'application avancé |\n| **B-ASC** | Application Specific Controller – contrôleur spécifique |\n\n---\n\n## 4. Architecture du système BACnet\n\n### 4.1 Modèle en couches\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│                    COUCHE APPLICATION                       │\n│         Objets (AI, AO, AV, BI, BO, Schedule, etc.)         │\n│                  Services (Read, Write, COV)                │\n├─────────────────────────────────────────────────────────────┤\n│                     COUCHE RÉSEAU                           │\n│              Routage entre réseaux BACnet                   │\n├─────────────────────────────────────────────────────────────┤\n│                 COUCHE LIAISON DE DONNÉES                   │\n│              BACnet/IP, BACnet MS/TP, BACnet/SC             │\n├─────────────────────────────────────────────────────────────┤\n│                    COUCHE PHYSIQUE                          │\n│            Ethernet, RS-485, Wi-Fi (optionnel)              │\n└─────────────────────────────────────────────────────────────┘\n```\n\n### 4.2 Types de réseaux à déployer\n\n| Type | Utilisation | Caractéristiques |\n|------|-------------|------------------|\n| **BACnet/IP** | Dorsale principale, supervision, contrôleurs principaux | UDP port 47808, haut débit, infrastructure Ethernet existante |\n| **BACnet MS/TP** | Niveau terrain (capteurs, actionneurs, terminaux) | Bus série RS-485, économique, robuste en environnement électrique perturbé |\n| **BACnet/SC** | Connexions sécurisées (chiffrement TLS) | Recommandé pour les communications sensibles et la conformité cybersécurité |\n\n---\n\n## 5. Composants et équipements\n\n### 5.1 Hiérarchie des contrôleurs\n\n```mermaid\ngraph TD\n    A[Poste de supervision B-AWS] --\u003e B[Contrôleurs principaux B-BC]\n    B --\u003e C1[Contrôleurs d'application B-AAC]\n    B --\u003e C2[Contrôleurs d'application B-AAC]\n    C1 --\u003e D1[Contrôleurs de terrain B-ASC]\n    C1 --\u003e D2[Contrôleurs de terrain B-ASC]\n    C2 --\u003e D3[Contrôleurs de terrain B-ASC]\n    D1 --\u003e E1[Capteurs / Actionneurs]\n    D2 --\u003e E2[Capteurs / Actionneurs]\n    D3 --\u003e E3[Capteurs / Actionneurs]\n```\n\n### 5.2 Équipements typiques par zone hospitalière\n\n| Zone | Systèmes à intégrer | Points critiques |\n|------|---------------------|------------------|\n| **Bloc opératoire** | CVC, pression différentielle, éclairage, gaz médicaux | Redondance, haute fiabilité, alarmes prioritaires |\n| **Soins intensifs** | CVC, surveillance température, humidité | Contrôle précis, COV pour réactivité |\n| **Chambres patients** | CVC, éclairage, stores | Confort, efficacité énergétique |\n| **Laboratoires** | Hottes, pression négative/positive | Sécurité du personnel, conformité |\n| **Pharmacie** | Réfrigération, température | Traçabilité, alarmes critiques |\n| **Espaces communs** | CVC, éclairage, comptage énergétique | Optimisation énergétique |\n| **Locaux techniques** | Chaufferie, refroidisseurs, pompes | Supervision centralisée, tendances |\n\n### 5.3 Fabricants recommandés (présence au Québec)\n\n- **Siemens** – Desigo CC, contrôleurs BACnet IP/MS/TP\n- **Johnson Controls** – Metasys\n- **Honeywell** – Niagara, ComfortPoint\n- **Schneider Electric** – EcoStruxure, SmartX\n- **Distech Controls** (Québec) – EC-Net 4, contrôleurs ECLYPSE\n- **Reliable Controls** (Canada) – MACH-System\n- **Belimo** – Vannes et capteurs BACnet\n\n---\n\n## 6. Topologie réseau recommandée\n\n### 6.1 Architecture physique\n\n```mermaid\ngraph TD\n    subgraph \"Niveau Supervision\"\n        SUP[Poste de supervision B-AWS]\n        HIST[Serveur historique / SCADA]\n    end\n    \n    subgraph \"Dorsale BACnet/IP\"\n        SW1[Switch Ethernet - Bâtiment A]\n        SW2[Switch Ethernet - Bâtiment B]\n        SW3[Switch Ethernet - Bâtiment C]\n    end\n    \n    subgraph \"Niveau Contrôleurs\"\n        BC1[B-BC Bâtiment A]\n        BC2[B-BC Bâtiment B]\n        BC3[B-BC Bâtiment C]\n    end\n    \n    subgraph \"Niveau Terrain - Bâtiment A\"\n        RT1[Routeur IP/MS-TP]\n        ASC1[B-ASC CVC Zone 1]\n        ASC2[B-ASC CVC Zone 2]\n    end\n    \n    SUP --\u003e SW1\n    HIST --\u003e SW1\n    SW1 --- SW2\n    SW2 --- SW3\n    SW1 --\u003e BC1\n    SW2 --\u003e BC2\n    SW3 --\u003e BC3\n    BC1 --\u003e RT1\n    RT1 --\u003e ASC1\n    RT1 --\u003e ASC2\n```\n\n### 6.2 Principes de conception\n\n| Principe | Recommandation |\n|----------|----------------|\n| **Segmentation** | Un réseau MS/TP par zone fonctionnelle (max. 128 appareils/segment) |\n| **Redondance** | Dorsale IP en anneau ou double étoile pour les zones critiques |\n| **BBMD** | Un BACnet Broadcast Management Device par sous-réseau IP |\n| **Isolation** | VLAN dédié à l'automatisation du bâtiment, séparé du réseau clinique |\n| **Adressage** | Plan d'adressage cohérent (Device ID unique sur tout le site) |\n\n### 6.3 Plan d'adressage suggéré\n\n| Plage Device ID | Affectation |\n|-----------------|-------------|\n| 1 – 99 | Postes de supervision et serveurs |\n| 100 – 199 | Contrôleurs principaux (B-BC) |\n| 1000 – 1999 | Bâtiment A – Contrôleurs d'application |\n| 2000 – 2999 | Bâtiment B – Contrôleurs d'application |\n| 10000 – 19999 | Bâtiment A – Contrôleurs de terrain |\n| 20000 – 29999 | Bâtiment B – Contrôleurs de terrain |\n\n---\n\n## 7. Objets BACnet et intégration des systèmes\n\n### 7.1 Types d'objets courants\n\n| Type | Code | Fonction | Exemple hospitalier |\n|------|------|----------|---------------------|\n| Analog Input | AI | Lecture capteur analogique | Température salle d'opération |\n| Analog Output | AO | Commande analogique | Position vanne eau glacée |\n| Analog Value | AV | Valeur interne / consigne | Consigne température |\n| Binary Input | BI | État binaire | Alarme filtre colmaté |\n| Binary Output | BO | Commande binaire | Marche/arrêt ventilateur |\n| Binary Value | BV | Variable binaire interne | Mode occupation |\n| Multi-state Input | MSI | État multiple | Mode CVC (chauffage/refroidissement/ventilation) |\n| Multi-state Output | MSO | Commande multiple | Vitesse ventilateur (basse/moyenne/haute) |\n| Schedule | SCH | Programmation horaire | Horaires occupation chambres |\n| Calendar | CAL | Calendrier exceptions | Jours fériés Québec |\n| Trend Log | TL | Historique de données | Température 24h bloc opératoire |\n| Notification Class | NC | Gestion des alarmes | Notification défaut critique |\n\n### 7.2 Services BACnet utilisés\n\n| Service | Usage |\n|---------|-------|\n| **ReadProperty / ReadPropertyMultiple** | Lecture de valeurs |\n| **WriteProperty / WritePropertyMultiple** | Écriture de consignes |\n| **SubscribeCOV** | Abonnement aux changements de valeur (réactivité) |\n| **Who-Is / I-Am** | Découverte d'équipements |\n| **ReadRange** | Récupération d'historiques (Trend Log) |\n| **AcknowledgeAlarm** | Acquittement d'alarmes |\n| **TimeSynchronization** | Synchronisation horaire des équipements |\n\n### 7.3 Intégration des systèmes hospitaliers\n\n```mermaid\ngraph LR\n    subgraph \"Supervision GTB\"\n        SCADA[Poste de supervision BACnet]\n    end\n    \n    subgraph \"Systèmes intégrés\"\n        CVC[CVC / HVAC]\n        ECL[Éclairage]\n        ELEC[Comptage électrique]\n        GAZ[Gaz médicaux]\n        FEU[Détection incendie]\n        ACC[Contrôle d'accès]\n        GEN[Génératrice]\n    end\n    \n    SCADA --\u003e CVC\n    SCADA --\u003e ECL\n    SCADA --\u003e ELEC\n    SCADA --\u003e GAZ\n    SCADA --\u003e FEU\n    SCADA --\u003e ACC\n    SCADA --\u003e GEN\n```\n\n**Points d'attention pour l'intégration :**\n\n- **Détection incendie** : souvent en lecture seule via passerelle BACnet dédiée\n- **Gaz médicaux** : interface avec système de surveillance des gaz (alarmes critiques)\n- **Génératrice** : surveillance état, transfert automatique\n- **Contrôle d'accès** : intégration pour coordination avec CVC (occupation)\n\n---\n\n## 8. Sécurité et cybersécurité\n\n### 8.1 Isolation réseau\n\n| Mesure | Description |\n|--------|-------------|\n| **VLAN dédié** | Séparer le réseau d'automatisation du réseau clinique et administratif |\n| **Pare-feu** | Contrôler les flux entre VLAN, autoriser uniquement le trafic BACnet (UDP 47808) |\n| **DMZ** | Placer les serveurs d'accès distant dans une zone démilitarisée |\n\n### 8.2 BACnet/SC (Secure Connect)\n\nPour les communications sensibles, BACnet/SC offre :\n\n- **Chiffrement TLS 1.3** des communications\n- **Authentification par certificats** (PKI)\n- **Protection contre l'interception et l'usurpation**\n\n**Recommandation :** Déployer BACnet/SC pour les connexions entre bâtiments et pour l'accès distant.\n\n### 8.3 Bonnes pratiques\n\n1. **Mots de passe forts** sur tous les équipements et postes de supervision\n2. **Mise à jour régulière** des firmwares des contrôleurs\n3. **Journalisation** des accès et des modifications\n4. **Sauvegardes régulières** des configurations\n5. **Tests de pénétration** annuels sur l'infrastructure GTB\n6. **Formation** du personnel aux risques cybersécurité\n\n### 8.4 Conformité\n\n- **Loi 25 du Québec** (protection des renseignements personnels) – s'assurer que les données GTB ne contiennent pas d'informations personnelles identifiables\n- **Normes CSA** applicables à la cybersécurité des systèmes industriels\n\n---\n\n## 9. Mise en service et tests\n\n### 9.1 Phases du projet\n\n| Phase | Activités | Livrables |\n|-------|-----------|-----------|\n| **1. Étude et conception** | Audit existant, définition des besoins, architecture | Cahier des charges, schémas d'architecture |\n| **2. Ingénierie détaillée** | Plans d'adressage, listes de points, séquences | Documents de conception détaillée |\n| **3. Installation** | Câblage, montage contrôleurs, configuration réseau | Rapports d'installation |\n| **4. Programmation** | Configuration contrôleurs, séquences de régulation | Programmes téléversés |\n| **5. Mise en service** | Tests point par point, calibration | Rapports de mise en service |\n| **6. Intégration** | Raccordement supervision, tests de bout en bout | Système fonctionnel |\n| **7. Validation** | Tests de performance, formation | Procès-verbal de réception |\n\n### 9.2 Tests de validation\n\n| Test | Objectif | Critère de réussite |\n|------|----------|---------------------|\n| **Découverte réseau** | Vérifier que tous les équipements sont visibles (Who-Is/I-Am) | 100 % des devices découverts |\n| **Lecture/écriture** | Valider la communication bidirectionnelle | Valeurs correctes, temps de réponse \u003c 2 s |\n| **COV** | Tester les notifications de changement | Notification reçue dans les 5 s |\n| **Alarmes** | Simuler des défauts et vérifier la remontée | Alarme affichée sur supervision |\n| **Tendances** | Enregistrer des données historiques | Données récupérables sur 24 h |\n| **Panne réseau** | Couper un segment et vérifier le fonctionnement autonome | Contrôleurs autonomes fonctionnels |\n| **Basculement** | Tester la redondance (si applicable) | Basculement transparent \u003c 30 s |\n\n### 9.3 Outils de commissionnement\n\n- **YABE** (Yet Another BACnet Explorer) – gratuit, open source\n- **VTS** (Visual Test Shell) – outil officiel ASHRAE\n- **BACnet Discovery Tool** – intégré à plusieurs logiciels de supervision\n- **Wireshark** avec plugin BACnet – analyse de trames\n\n---\n\n## 10. Exploitation et maintenance\n\n### 10.1 Documentation à maintenir\n\n| Document | Contenu |\n|----------|---------|\n| **Plan d'adressage** | Device ID, adresses IP, numéros de réseau MS/TP |\n| **Liste de points** | Objets BACnet avec descriptions, unités, plages |\n| **Schémas d'architecture** | Topologie physique et logique |\n| **Séquences de régulation** | Logique de contrôle de chaque système |\n| **Procédures d'exploitation** | Marches forcées, acquittement alarmes, etc. |\n\n### 10.2 Maintenance préventive\n\n| Activité | Fréquence |\n|----------|-----------|\n| Vérification des alarmes actives | Quotidienne |\n| Sauvegarde des configurations | Mensuelle |\n| Vérification des tendances | Mensuelle |\n| Calibration des capteurs critiques | Annuelle |\n| Mise à jour des firmwares | Annuelle (après tests) |\n| Audit de cybersécurité | Annuelle |\n\n### 10.3 Contrat de maintenance recommandé\n\nPrévoir un contrat de service avec :\n\n- Support téléphonique (heures ouvrables + astreinte pour systèmes critiques)\n- Interventions sur site sous 4 h pour zones critiques\n- Maintenance préventive biannuelle\n- Mises à jour logicielles incluses\n\n---\n\n## 11. Annexes\n\n### Annexe A – Exemple de liste de points (extrait)\n\n| Device ID | Nom objet | Type | Instance | Description | Unité |\n|-----------|-----------|------|----------|-------------|-------|\n| 1001 | SAL_OP_01_TEMP_AMB | AI | 1 | Température ambiante salle OP 01 | °C |\n| 1001 | SAL_OP_01_TEMP_CONS | AV | 1 | Consigne température salle OP 01 | °C |\n| 1001 | SAL_OP_01_PRESSION | AI | 2 | Pression différentielle salle OP 01 | Pa |\n| 1001 | SAL_OP_01_VENT_CMD | BO | 1 | Commande ventilateur salle OP 01 | – |\n| 1001 | SAL_OP_01_DEF_FILTRE | BI | 1 | Alarme filtre colmaté | – |\n| 1001 | SAL_OP_01_MODE | MSI | 1 | Mode CVC (0=Off, 1=Chauf, 2=Clim) | – |\n\n---\n\n### Annexe B – Glossaire\n\n| Terme | Définition |\n|-------|------------|\n| **B-AWS** | BACnet Advanced Workstation – poste de supervision avancé |\n| **B-BC** | BACnet Building Controller – contrôleur principal de bâtiment |\n| **BBMD** | BACnet Broadcast Management Device – gère les broadcasts entre sous-réseaux IP |\n| **COV** | Change Of Value – notification lors d'un changement de valeur |\n| **GTB** | Gestion Technique du Bâtiment |\n| **MS/TP** | Master-Slave / Token-Passing – protocole série BACnet sur RS-485 |\n| **PICS** | Protocol Implementation Conformance Statement – document de conformité |\n\n---\n\n### Annexe C – Références et ressources\n\n- **ASHRAE** – Standard 135 (BACnet) : [ashrae.org](https://www.ashrae.org)\n- **BACnet International** – Ressources et certifications : [bacnetinternational.org](https://www.bacnetinternational.org)\n- **Régie du bâtiment du Québec** – Code de construction : [rbq.gouv.qc.ca](https://www.rbq.gouv.qc.ca)\n- **Transition énergétique Québec** – Programmes d'efficacité : [transitionenergetique.gouv.qc.ca](https://www.transitionenergetique.gouv.qc.ca)\n- **Distech Controls** – Documentation EC-Net 4 BACnet : [distech-controls.com](https://www.distech-controls.com)\n- **YABE** – Explorateur BACnet gratuit : [sourceforge.net/projects/yetanotherbacnetexplorer](https://sourceforge.net/projects/yetanotherbacnetexplorer)\n\n---\n\n### Annexe D – Checklist de projet\n\n- [ ] Audit des systèmes existants réalisé\n- [ ] Cahier des charges validé\n- [ ] Plan d'adressage BACnet défini\n- [ ] Architecture réseau approuvée\n- [ ] VLAN et pare-feu configurés\n- [ ] Équipements commandés avec PICS conformes\n- [ ] Installation câblage complétée\n- [ ] Contrôleurs installés et adressés\n- [ ] Programmation terminée\n- [ ] Tests point par point réalisés\n- [ ] Intégration supervision complétée\n- [ ] Formation du personnel effectuée\n- [ ] Documentation remise\n- [ ] Procès-verbal de réception signé\n- [ ] Contrat de maintenance en place\n\n---\n\nCe dossier constitue une base solide pour la planification et la réalisation d'un réseau BACnet dans un établissement hospitalier au Québec. Chaque projet devra être adapté aux spécificités du site, aux équipements existants et aux exigences particulières de l'établissement de santé."])</script><script>self.__next_f.push([1,"35:T3a9d,"])</script><script>self.__next_f.push([1,"DIS\nCON\n\na4\n7m\n‘@)\nas\n\nie)\nwn\n\nL\n\nEC Net4 BACnet Driver Guide\n\nUser Guide\n\nConnecting People with\nIntelligent Building Solutions\n\nEC Net4 BACnet Driver Guide\nDistech Controls, Inc.\nBrossard, Quebec,\nCanada\nLegal Notice\n©, Distech Controls Inc., 2024. All rights reserved. While all efforts have been made to verify the accuracy of in\u0002formation in this manual, Distech Controls is not responsible for damages or claims arising from the use of this\nmanual. Persons using this manual are assumed to be trained HVAC professionals and are responsible for us\u0002ing the correct wiring procedures, correct override methods for equipment control and maintaining safe working\nconditions in fail-safe environments. Distech Controls re v Trend Log Ext (bacnet\u0002BacnetNumericCovTrendLogExt)..............................................204\nBacnet Numeric Interval Trend Log Ext (bacnet\u0002BacnetNumericIntervalTrendLogExt).........................................205\nBacnet Numeric Trend Log Ext (bacnet\u0002BacnetNumericTrendLogExt)....................................................207\nBacnet Numeric Trend Log Remote Ext (bacnet\u0002BacnetNumericTrendLogRemoteExt)........................................209\nBac"])</script><script>self.__next_f.push([1,"36:T1d11,"])</script><script>self.__next_f.push([1,"BACnet - Remote\n\n# BACnet\n\nDernière mise à jour le 16 octobre 2025\n\nBACnet et l’automatisation des bâtiments constituent ensemble la base de la gestion de l’énergie, du confort et de la maintenance des bâtiments modernes. Dans cet article, j’explique dans un langage simple ce qu’est BACnet, pourquoi il est important pour la gestion des bâtiments et la conformité GACS, et quels composants (objets, services, réseaux) vous rencontrerez lors de la mise en place d’un GBS.\n\n## Qu’est-ce que BACnet et l’automatisation des bâtiments ?\n\nBACnet (Building Automation and Control Networks) est une norme de communication ouverte, définie dans la norme ISO 16484-5. L’objectif est simple : permettre aux appareils de différents fabricants de collaborer sans verrouillage propriétaire. Vous retrouvez BACnet dans des systèmes tels que le HVAC, l’éclairage, le contrôle d’accès, les compteurs et la protection solaire. Dans de nombreux projets, la liaison avec la gestion des bâtiments est essentielle pour les rapports GACS et l’optimisation énergétique.\n\n### Principales caractéristiques\n\n1. Norme ouverte — pas de licences ni de verrouillage propriétaire\n2. Interopérabilité — les équipements de différentes marques fonctionnent ensemble\n3. Orienté objet — les données sont organisées en objets (par exemple, Analog Input)\n4. Indépendant du réseau — fonctionne sur IP (BACnet/IP), MS/TP ou sans fil\n5. Flexible et évolutif — du petit bureau au grand campus\n\n## Architecture : couches et types de réseaux\n\n### Modèle de couches\n\nBACnet n’est pas strictement OSI, mais vous pouvez le mapper sur des couches que vous connaissez :\n\n1. Couche application — objets, propriétés et services\n2. Couche réseau — routage entre les réseaux BACnet\n3. Couche liaison de données — méthode de transport physique (Ethernet, MS/TP)\n4. Couche physique — câblage et matériel (RS-485, UTP, Wi‑Fi)\n\n### Types de réseaux et leur utilisation\n\nLes deux options les plus courantes sont BACnet/IP et BACnet MS/TP. BACnet/IP utilise UDP (port 47808) et convient au niveau de supervision et à la communication rapide des contrôleurs. MS/TP fonctionne sur un bus série RS-485 et est courant au niveau du terrain pour les capteurs et les régulateurs de vannes. En pratique, une dorsale IP est souvent combinée avec des bus de terrain MS/TP ; les routeurs traduisent entre ces mondes.\n\n## Objets et services : comment les données sont organisées\n\nBACnet est orienté objet : chaque point de données est un type d’objet avec des propriétés (telles que Present Value). Vous trouverez ci-dessous les types d’objets couramment utilisés et leur fonction.\n\n| Type d’objet | Fonction | Exemples |\n| --- | --- | --- |\n| Analog Input (AI) | Lecture des données de capteurs analogiques | Température, CO₂, pression |\n| Analog Output (AO) | Commande analogique des actionneurs | Position de la vanne, vitesse du ventilateur |\n| Analog Value (AV) | Valeurs internes et points de consigne | Points de consigne, bandes |\n| Binary Input (BI) | Lecture des états numériques | Contact de porte, signal de défaut |\n| Binary Output (BO) | Commande numérique | Pompes marche/arrêt, éclairage |\n| Schedule | Programmes horaires | Régulation travail/week-end HVAC |\n| Trend Log | Enregistrement des données historiques | Évolution de la température, énergie |\n| Device | Identification et communication entre les appareils | Routeur, contrôleur, passerelle |\n\n### Services de base\n\n| Service | Fonction |\n| --- | --- |\n| ReadProperty | Lecture d’une propriété |\n| WriteProperty | Définition d’une propriété (par exemple, point de consigne) |\n| Who-Is / I-Am | Détection d’appareils sur le réseau |\n| SubscribeCOV | Mises à jour basées sur les événements (Change of Value) |\n| ReadRange | Récupération des données historiques du Trend Log |\n\nCOV (Change of Value) est efficace : un contrôleur n’envoie des mises à jour que si une valeur change réellement, au lieu de sonder constamment.\n\n## Contrôleurs, fabricants et intégration\n\nBACnet est pris en charge par de nombreux fournisseurs. Le choix dépend de la taille du bâtiment, de la stratégie de régulation souhaitée et des besoins d’intégration. Voici quelques noms que vous voyez régulièrement :\n\n1. Priva — régulateurs de climat, contrôleurs IP et de terrain, intégration avec le cloud\n2. Siemens — Contrôleurs Desigo IP, grands bâtiments utilitaires et hôpitaux\n3. Schneider Electric — SmartX / SpaceLogic\n4. Honeywell — ComfortPoint / Open\n5. Johnson Controls — Metasys BACnet\n6. Trend Controls — populaire dans les bureaux\n7. Belimo — Vannes et capteurs BACnet\n\nLes contrôleurs peuvent fonctionner de manière autonome ou sous supervision. Les contrôleurs IP contiennent souvent leur propre logique, leurs propres schémas et leurs propres trendlogs ; les contrôleurs de terrain fonctionnent souvent de manière décentralisée sur MS/TP.\n\n## Conseils pratiques pour la gestion et l’accès aux données\n\nLors du déverrouillage des données BACnet, faites attention à quelques points pratiques :\n\n1. Documentez clairement les noms d’objets et les ID — cela évite les erreurs de lecture.\n2. Utilisez les abonnements COV dans la mesure du possible pour limiter le trafic réseau.\n3. Planifiez soigneusement les routeurs entre IP et MS/TP (segmentation et latence).\n4. Tenez compte de la sécurité et de l’isolation des réseaux de gestion ; le cloud et la cybersécurité restent importants.\n5. Assurez-vous que les trendlogs et les calendriers sont centralisés pour l’analyse énergétique et la justification GACS.\n\nPour les manuels et les informations sur les produits, vous pouvez également consulter la documentation sur la gestion des bâtiments et les spécifications de vos fabricants. Remote maintient une collection de ressources et de services pour l’intégration et la gestion ; consultez le site général pour plus de contexte : Remote.\n\n## Conclusion\n\nBACnet est plus qu’un protocole : c’est l’épine dorsale technique de l’automatisation interopérable des bâtiments. Avec une architecture BACnet bien conçue, vous pouvez surveiller les performances énergétiques et de confort, optimiser les stratégies de régulation et rendre compte efficacement pour GACS. Le déverrouillage correct des données BACnet prend en charge la maintenance, la surveillance des données et la pérennité de votre installation — et rend la gestion plus claire pour les gestionnaires de bâtiments. Pour des exemples concrets et des solutions concernant la surveillance des données, vous pouvez consulter la documentation sur la surveillance des données.\n\nDans cet article\n\n- Qu’est-ce que BACnet et l’automatisation des bâtiments ?\n- Architecture : couches et types de réseaux\n- Objets et services : comment les données sont organisées\n- Contrôleurs, fabricants et intégration\n- Conseils pratiques pour la gestion et l’accès aux données\n- Conclusion\n\nTirez le meilleur parti de vos données machine\n\nCommencez avec la surveillance des données\n\nEssayez gratuitement pendant 30 jours!\n\n### Remote Engineer B.V.\n\n+31 566 796 515\n\nIt Vegelinskampke 118491 PD AkkrumPays-Bas\n\nNuméro de Kvk : 50432737TVA : NL822740771B01\n\n### Connect\n\n### Control\n\n### Sécurisé\n\nCopyright © 2025 Remote Engineer B.V. Tous droits réservés."])</script><script>self.__next_f.push([1,"37:T92d,"])</script><script>self.__next_f.push([1,"Mise en place d'un systèm Réimplantation de l’ensemble d’un dispositif de gestion de d...\n\n### Conception d’une plateforme modulable sur différents wagons ...\n\n### Gestion de la révision complète d'une chargeuse de carrière ...\n\n### Etude des techniques HVAC et sanitaires pour un bâtiment adm...\n\n### Etude d'une stratégie de production et commerciale pour la v...\n\nΛ"])</script><script>self.__next_f.push([1,"38:T1380,"])</script><script>self.__next_f.push([1,"Généralités sur BACnet\n\n# Généralités sur BACnet\n\nBACnet est le terme généralement utilisé en référence à la norme ANSI/ASHRAE 135, adoptée et supportée par l'ANSI (American National Standard Institute) et l'ASHRAE (American Society of Heating Refrigeration and Air-Conditioning Engineers). Le nom BACnet signifie Building Automation and Control Network. BACnet est un standard de communication ouvert, non propriétaire, conçu par un consortium de gestionnaires de bâtiment, d'utilisateurs de système et de fabricants pour gérer l’échange de données au sein des systèmes de Gestion Techniques des Bâtiments (BAS).\n\n- Chaque objet contient une ou plusieurs propriétés. Les propriétés disponibles sont définies par le standard BACnet.\n- Un équipement doit toujours contenir au moins une instance d'un objet Device.\n- Il peut y avoir une ou plusieurs instances d'un objet dans un équipement.\n- Chaque équipement contient un ou plusieurs objets. Les objets disponibles sont définis par le standard BACnet.\n- Un réseau BACnet comprend un ou plusieurs équipements. Un équipement correspond généralement à un équipement physique.\n- Le protocole BACNET définit un certain nombre de couches liaison et de couches physiques, y compris ARCNET, Ethernet, BACnet/IP, point-à-point sur RS-232, Maître-Esclave/Jeton sur RS-485 et LonTalk.\n\nVous pouvez obtenir une copie du standard complet BACnet The BACnet Standard—Standard 135-2012 depuis la base de connaissance de l'organisation ASHRAE.\n\nPcVue a été validé en tant que poste de travail avancée BACnet (B-AWS).\n\nLe driver BACnet supporte uniquement BACnet/IP, et utilise la carte réseau du PC hôte. Pour plus de détails sur le support BACnet, voir la rubrique PICS BACnet.\n\nIl est usuel en BACnet de spécifier les fonctionnalités en décrivant les sous-ensembles d'interopérabilité suivants :\n\n- Programmation horaire\n- Tendances et consignation d'événements\n- Notifications d'alarmes et d'événements\n- Données temps réel\n- Gestion Réseau et Equipement\n\nCe chapitre couvre ces domaines d'interopérabilité et en particulier ce qui est nécessaire lors de la configuration des connexions BACnet, les réseaux et les équipements, l’échange de données temps réel et l'utilisation des objets d'automation BACnet en particulier les objets de type Notification Class, Trends Log, Trend Log multiple, Event Log, Schedule et Calendar.\n\nLa configuration BACnet est accessible depuis l'Application Explorer.\n\nGestion Réseau et Equipement\n\nFonctions de gestion des connexions et contrôle des équipements incluant :\n\n- La découverte des équipements et des objets sur un réseau BACnet.\n- La capacité pour PcVue d’exposer un Device BACnet aux autres équipements physiques sur le réseau.\n\nAjout d'un Réseau BACnet\n\nAjout d'Equipements à un Réseau BACnet\n\nTâches de Gestion des équipements BACnet\n\nDonnées temps réel\n\nGénéralités sur l’éditeur de Mapping BACnet\n\nComment configurer les données temps réel\n\nNotifications d'alarmes et d'événements\n\nUtilisation d'un Objet Notification Class\n\nConfiguration du logiciel PcVue pour recevoir une Notification Alarme/Evénement\n\nTendances et consignation d'événements\n\nUtilisation d'un Objet Trend Log BACnet\n\nConfiguration du logiciel PcVue pour récupérer des enregistrements de Tendances BACnet\n\nProgrammation horaire\n\nUtilisation des objets Schedule et Calendar\n\nConfiguration du logiciel PcVue pour l'utilisation d'un objet Schedule\n\nConfiguration du logiciel PcVue pour l'utilisation d'un objet Calendar\n\n| Domaine d'interopérabilité | Description | Rubriques d'aides |\n| --- | --- | --- |\n| Fonctions élémentaires de surveillance et de contrôle, mise à jour des valeurs temps-réel, gestion des commandes et de leurs priorités. |\n| Fonctions relatives aux notifications d'alarmes et acquittement, incluant la gestion des objets de type Notification Class. |\n| Fonctions relatives aux tendances et à la consignation d'événements, incluant la gestion des objets de type Trend Log, Trend Log Multiple et Event Log. |\n| Fonctions relatives à la gestion des tables horaires, incluant la gestion des objets de type Schedule et Calendar. |\n\nLe driver BACnet est disponible en mode démonstration. Le driver s’arrête automatiquement à la fin de la période d’essai.\n\nAfin de supporter les exigences des profils B-OWS et B-AWS, la mise en œuvre de BACnet dans PcVue a fait l'objet d'une refonte majeure en version 11.2. Pour plus d'informations sur le processus de migration, voir la rubrique Utilisation de la configuration BACnet d'un projet configuré avec une version précédente du logiciel PcVue.\n\n# Envoyez-nous vos commentaires\n\nVous pouvez également nous contacter à l'adresse team-doc@pcvuesolutions.com\n\nCopyright © 2024 ARC Informatique. Tous droits réservés.\n\nPolitique de confidentialité| Mentions légales| Copyright| Termes et conditions| Avis de non-responsabilité du site web\n\nPcVue"])</script><script>self.__next_f.push([1,"39:T162f,"])</script><script>self.__next_f.push([1,"BACnet – Mode d’emploi – Smart \u0026 Connective\n\n## Introduction\n\nLe protocole BACnet (Building Automation and Control Network) est un standard international (ISO 16484-5) conçu pour la communication entre systèmes d’automatisation du bâtiment (GTB, CVC, éclairage, comptage énergétique, etc.).\n\nChez Smart \u0026 Connective, le protocole BACnet/IP est nativement pris en charge par l’automate CEOS, qui agit comme client BACnet (c’est-à-dire qu’il interroge et pilote les serveurs BACnet présents sur le réseau).Les réseaux BACnet MS/TP peuvent également être intégrés via des convertisseurs spécifiques BACnet/IP ↔ MS/TP, permettant de raccorder des équipements RS485 au réseau IP.\n\n---\n\n## Utilisation du BACnet et abonnement CEOS\n\nL’activation et l’utilisation du protocole BACnet/IP sur un automate CEOS entraînent un surcoût d’abonnement de 30 € HT.Cet abonnement permet la lecture et l’écriture de jusqu’à 100 propriétés Smart \u0026 Connective — soit l’équivalent de 200 objets BACnet (lecture + écriture).\n\n🔹 Une propriété Smart \u0026 Connective correspond à un point de donnée : par exemple, une température ambiante, une consigne de soufflage, ou un mode HVAC.Ainsi, un CEOS peut lire et écrire jusqu’à 100 points distincts sur un réseau BACnet :\n\nLecture de températures, débits d’air, codes d’alarme...\n\nCommande de modes, setpoints, ventilateurs, etc.\n\n---\n\n## Prérequis\n\nLors de l’audit du site, il est essentiel de déterminer si l’équipement à intégrer est compatible BACnet/IP ou BACnet MS/TP.\n\n### Étapes recommandées :\n\nIdentifier la marque et le modèle exact de l’équipement.\n\nConsulter la documentation technique pour vérifier la présence du protocole BACnet (IP ou MS/TP).\n\nSi le protocole est optionnel, relever également le numéro de série afin d’interroger le fabricant sur les cartes d’extension installées.\n\nEn l’absence de compatibilité native, il peut être nécessaire d’ajouter une carte BACnet optionnelle sur l’équipement concerné.\n\nEn cas de MS/TP, prévoir un convertisseur BACnet/IP ↔ MS/TP pour la communication avec le CEOS.\n\n### Outil recommandé :\n\nYABE (Yet Another BACnet Explorer)\n\n---\n\n## Tables d’objets et paramètres de communication\n\nUne fois la compatibilité confirmée, il faut :\n\nRécupérer la table des objets BACnet (équivalent de la table de registres Modbus).Elle est fournie dans la documentation technique du fabricant et liste tous les objets disponibles :\n\nAnalog Inputs (AI), Analog Outputs (AO), Binary Inputs (BI), Binary Outputs (BO), Analog Values (AV), Binary Values (BV).\n\nIdentifier les objets utiles à piloter ou superviser, généralement une quinzaine par équipement :\n\nTempérature de soufflage\n\nTempérature de reprise\n\nMode HVAC\n\nOn/Off\n\nConsigne de température\n\nDéfaut principal\n\nDébit de soufflage\n\nCréer la table des objets - Création des devices templates (Modbus / BACnet)\n\n---\n\n## Comprendre le protocole BACnet/IP\n\n### Structure du protocole\n\nBACnet repose sur une logique orientée objet, chaque objet représentant un point mesurable ou pilotable.\n\n| Type d’objet | Nom complet | Exemple d’usage |\n| --- | --- | --- |\n| AI | Analog Input | Température mesurée |\n| AO | Analog Output | Consigne de soufflage |\n| BI | Binary Input | Alarme filtre |\n| BO | Binary Output | Commande ventilateur |\n| AV / BV | Analog / Binary Value | Variables internes |\n\nChaque objet est identifié par :\n\nObject Type (ex.`analogInput`),\n\nObject Instance (ex.`0`,`1`…),\n\nProperty ID (ex.`85` pour Present Value).\n\n---\n\n## Rôle du CEOS dans la communication BACnet\n\nLe CEOS joue toujours le rôle de client BACnet.Il interroge les serveurs BACnet (CTA, PAC, variateurs, etc.), lit leurs objets et écrit les consignes nécessaires.\n\nLes données lues sont ensuite synchronisées avec le cloud Smart \u0026 Connective, permettant :\n\nla visualisation dans les dashboards,\n\nl’automatisation des scénarios,\n\net la supervision énergétique.\n\n---\n\n## Topologie : BACnet/IP et MS/TP via convertisseur\n\n### BACnet/IP (natif)\n\nLe CEOS communique directement avec les devices BACnet/IP via UDP (port 47808).\n\n### BACnet MS/TP (via convertisseur)\n\nLe CEOS reste client BACnet/IP, mais passe par un switch ou convertisseur BACnet/IP ↔ MS/TP pour atteindre les devices RS485.Le convertisseur agit comme une passerelle logique, rendant visibles les devices MS/TP sur le réseau IP.\n\n---\n\n## Configuration BACnet/IP sur le CEOS\n\n| Paramètre | Description | Par défaut |\n| --- | --- | --- |\n| Ceos ID | Identifiant unique sur le réseau | 0xCE05 |\n| Port BACnet | Par défaut BACnet | 0xBAC0 |\n\nLors de la création de l’automate sur le portail d’Hypervision, ou en allant dans l’édition d’un automate déjà créé, activer la fonction “BACnet activé” :\n\nLes champs \"CEOS ID\" et \"Port BACnet\" seront renseignés par défaut (attention : à modifier que si cela est nécessaire !)\n\nCliquer sur \"Sauvegarder la configuration du Ceos\" pour enregistrer la configuration et activé la fonctionnalité BACnet.\n\n---\n\n## Ajout de l'équipement\n\nUne fois votre automate configuré pour communiquer en BACnet, il sera possible d’ajouter des devices BACnet, de la même manière que les devices sans fils.\n\nLa seule différence sera la nécessité d’ajouter l’ID BACnet de votre équipement sur le bus.\n\nNe pas oublier de synchroniser le CEOS après les modifications.\n\n- Configuration device BACnet.jpg 100 ko\n- Configuration CEOS BACnet.jpg 90 ko\n\n#### Cet article vous a-t-il été utile ?\n\nOui Non\n\nUtilisateurs qui ont trouvé cela utile : 0 sur 0\n\nVous avez d’autres questions ? Envoyer une demande"])</script><script>self.__next_f.push([1,"19:[\"$\",\"$L33\",null,{\"activeExperiment\":null,\"autoResume\":true,\"chatExists\":true,\"id\":\"55acecb9-353a-4870-82cd-3a1d691eda22\",\"initialChatModel\":\"gateway-gpt-5\",\"initialMessages\":[{\"id\":\"ElTrm6o9R61f7RqX\",\"parts\":[{\"type\":\"text\",\"text\":\"faire un dossier complet pour la mise en place d'un réseau BACnet dans un hopital au quebec\"}],\"role\":\"user\",\"metadata\":\"$undefined\"},{\"id\":\"RVRDZb6WnfvcHHfm\",\"parts\":[{\"type\":\"text\",\"text\":\"$34\"},{\"type\":\"source-url\",\"sourceId\":\"https://docs-be.distech-controls.com/bundle/EC-Net4-Bacnet-Guide_UG_16_EN/raw/resource/enus/EC-Net4%20Bacnet%20Guide_UG_16_EN.pdf\",\"url\":\"https://docs-be.distech-controls.com/bundle/EC-Net4-Bacnet-Guide_UG_16_EN/raw/resource/enus/EC-Net4%20Bacnet%20Guide_UG_16_EN.pdf\",\"title\":\"\",\
